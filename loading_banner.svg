<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --primary: #1d4ed8;
    }
    
    .neon-logo {
      stroke-dasharray: 25 75;
      animation: stroke 3s linear infinite;
      stroke: var(--primary);
      stroke-width: 12;
      stroke-linecap: round;
      fill: none;
      filter: drop-shadow(0 0 6px rgba(29, 78, 216, 0.4)) drop-shadow(0 0 15px rgba(29, 78, 216, 0.2));
    }
    
    @keyframes stroke {
      from {
        stroke-dashoffset: 100;
      }
      to {
        stroke-dashoffset: 0;
      }
    }
    
    .base-trace {
      stroke: rgba(255, 255, 255, 0.05);
      stroke-width: 12;
      stroke-linecap: round;
      fill: none;
    }
    
    .glow-line {
      fill: none;
      stroke: url(#glowGradient);
      stroke-width: 1;
    }
  </style>
  
  <defs>
    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent" />
      <stop offset="50%" stop-color="#1d4ed8" stop-opacity="0.3" />
      <stop offset="100%" stop-color="transparent" />
    </linearGradient>
    
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.1" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" fill="#0a0a0c" />
  <rect width="100%" height="100%" fill="url(#bgGradient)" opacity="0.3" />
  
  <g class="container">
    <g transform="translate(450, 150) scale(0.22)">
      <g transform="translate(-500, -342)">
        <g class="base-trace">
          <path d="M994 435.882V684H522.628V435.882H994Z" />
          <path d="M756.255 0L360.015 684H7L399.124 0H756.255Z" />
        </g>
        
        <g class="neon-logo">
          <path d="M994 435.882V684H522.628V435.882H994Z" pathLength="100" />
          <path d="M756.255 0L360.015 684H7L399.124 0H756.255Z" pathLength="100" />
        </g>
      </g>
    </g>
    
    <line x1="384" y1="260" x2="516" y2="260" class="glow-line" />
  </g>
</svg>
